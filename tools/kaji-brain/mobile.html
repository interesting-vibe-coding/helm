<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kaji — fleet</title>
<style>
  :root {
    --ink: #14121c; --panel: #1d1a28; --line: #2c2838;
    --cream: #ece5d8; --dim: #8d8798; --accent: #8d7bd4;
    --busy: #6fbf8f; --wait: #e0a458; --idle: #5c5768;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--ink); color: var(--cream); min-height: 100vh;
    font: 15px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
    padding: max(16px, env(safe-area-inset-top)) 16px 32px;
  }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .04em; }
  header .sub { color: var(--dim); font-size: 12px; }
  #quota { color: var(--dim); font-size: 12px; margin-bottom: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.waiting { background: var(--wait); animation: pulse 1.4s ease-in-out infinite; }
  .dot.busy, .dot.running { background: var(--busy); }
  .dot.idle, .dot.unknown { background: var(--idle); }
  @keyframes pulse { 50% { opacity: .35; } }
  .name { font-weight: 600; }
  .meta { color: var(--dim); font-size: 12px; margin-left: auto; }
  .sendbox { display: none; margin-top: 10px; gap: 8px; }
  .card.open .sendbox { display: flex; }
  .sendbox input {
    flex: 1; background: var(--ink); color: var(--cream);
    border: 1px solid var(--line); border-radius: 7px; padding: 9px 10px;
    font: inherit; font-size: 14px;
  }
  button {
    background: var(--accent); color: var(--ink); border: 0; border-radius: 7px;
    padding: 9px 14px; font: inherit; font-size: 14px; font-weight: 600;
  }
  button:active { opacity: .8; }
  #gate { max-width: 360px; margin: 18vh auto 0; text-align: center; }
  #gate p { color: var(--dim); font-size: 13px; margin: 10px 0 16px; }
  #gate input {
    width: 100%; background: var(--panel); color: var(--cream);
    border: 1px solid var(--line); border-radius: 8px; padding: 11px;
    font: inherit; margin-bottom: 10px; text-align: center;
  }
  #gate button { width: 100%; padding: 11px; }
  #err {
    display: none; background: #3a2330; border: 1px solid #5c3346; color: #e8b4c8;
    border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px;
  }
  .empty { color: var(--dim); text-align: center; padding: 40px 0; font-size: 13px; }
</style>
</head>
<body>

<div id="gate" hidden>
  <h1>Kaji</h1>
  <p>fleet access token<br>(KAJI_BRAIN_TOKEN on the Mac)</p>
  <input id="tok" type="password" placeholder="token" autocomplete="off">
  <button onclick="saveToken()">Connect</button>
</div>

<div id="app" hidden>
  <header><h1>Kaji fleet</h1><span class="sub" id="ts"></span></header>
  <div id="err"></div>
  <div id="quota"></div>
  <div id="list"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem("kaji-token") || "";
let timer = null;
const openPanes = new Set();

function saveToken() {
  token = $("tok").value.trim();
  if (!token) return;
  localStorage.setItem("kaji-token", token);
  boot();
}

function logout(msg) {
  localStorage.removeItem("kaji-token"); token = "";
  clearInterval(timer); timer = null;
  $("app").hidden = true; $("gate").hidden = false;
  if (msg) { $("gate").querySelector("p").textContent = msg; }
}

async function api(path, opts) {
  const r = await fetch(path, Object.assign({
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
  }, opts));
  if (r.status === 401) { logout("token rejected — enter it again"); throw new Error("401"); }
  return r.json();
}

function fmtRuntime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? h + "h" + String(m).padStart(2, "0") + "m" : m + "m";
}

function render(state) {
  $("ts").textContent = new Date(state.ts * 1000).toLocaleTimeString();
  const q = state.quota || {};
  $("quota").textContent = "tokens today · " + (Object.entries(q)
    .filter(([, v]) => v > 0)
    .map(([k, v]) => k + " " + (v >= 1000 ? Math.round(v / 1000) + "k" : v))
    .join(" · ") || "none");
  const list = $("list");
  const sessions = state.sessions || [];
  if (!sessions.length) {
    list.innerHTML = '<div class="empty">no active sessions</div>';
    return;
  }
  list.innerHTML = "";
  for (const s of sessions) {
    const card = document.createElement("div");
    card.className = "card" + (openPanes.has(s.pane_id) ? " open" : "");
    const st = (s.state || "unknown").toLowerCase();
    card.innerHTML =
      '<div class="row">' +
        '<span class="dot ' + st + '"></span>' +
        '<span class="name"></span>' +
        '<span class="meta"></span>' +
      '</div>' +
      '<div class="sendbox row">' +
        '<input placeholder="send to this worker…" enterkeyhint="send">' +
        '<button>Send</button>' +
      '</div>';
    card.querySelector(".name").textContent = s.harness + " · " + (s.project || "?");
    card.querySelector(".meta").textContent = st + " · " + fmtRuntime(s.runtime_secs || 0);
    card.querySelector(".row").onclick = () => {
      openPanes.has(s.pane_id) ? openPanes.delete(s.pane_id) : openPanes.add(s.pane_id);
      card.classList.toggle("open");
    };
    const input = card.querySelector("input");
    const send = async () => {
      const text = input.value.trim();
      if (!text) return;
      try {
        await api("/api/send", { method: "POST", body: JSON.stringify({ pane_id: s.pane_id, text }) });
        input.value = ""; refresh();
      } catch (e) { showErr("send failed: " + e.message); }
    };
    card.querySelector("button").onclick = send;
    input.onkeydown = e => { if (e.key === "Enter") send(); };
    list.appendChild(card);
  }
}

function showErr(msg) {
  const el = $("err");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 4000);
}

async function refresh() {
  try {
    render(await api("/api/state"));
  } catch (e) {
    if (e.message !== "401") showErr("unreachable — is the Mac online?");
  }
}

function boot() {
  $("gate").hidden = true; $("app").hidden = false;
  refresh();
  clearInterval(timer);
  timer = setInterval(refresh, 4000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) refresh();
  });
}

token ? boot() : ($("gate").hidden = false);
</script>
</body>
</html>
