<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Kaji — fleet</title>
<style>
  /* Kaji Sun (docs/design/kaji-sun-v3.html): paper, warm ink, ONE persimmon.
     Orange has one meaning — needs you / your action. */
  :root {
    --paper: #fbf8f2; --card: #ffffff; --ink: #211c15; --dim: #8a8174;
    --ash: #b5ab9c; --faint: #e8e2d6; --track: #f0ebe1; --sun: #f25c05;
    --sun-soft: #fde8da;
  }
  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--paper); color: var(--ink); min-height: 100vh;
    font: 14px/1.6 ui-monospace, "SF Mono", Menlo, monospace;
    padding: max(14px, env(safe-area-inset-top)) 18px
             max(14px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
  }
  .wrap { max-width: 860px; margin: 0 auto; width: 100%;
          display: flex; flex-direction: column; flex: 1; }

  header { display: flex; align-items: baseline; gap: 9px; padding-top: 8px; }
  header svg { transform: translateY(2px); flex: none; }
  .brand { font: 700 17px/1 Georgia, serif; letter-spacing: .16em; }
  .brand i { font-style: normal; color: var(--sun); }
  #quota { margin-left: auto; color: var(--dim); font-size: 11px; text-align: right; }
  #quota b { color: var(--ink); font-weight: 600; }
  .hr { border: 0; border-top: 1px solid var(--faint); margin: 14px 0 4px; }

  #err {
    display: none; border: 1px solid var(--sun); color: var(--sun);
    border-radius: 9px; padding: 8px 12px; font-size: 12px; margin: 10px 0 0;
    background: var(--sun-soft);
  }

  .sess { display: flex; align-items: center; gap: 10px; min-height: 46px;
          border-bottom: 1px solid var(--track); position: relative; padding: 0 2px; }
  .sess:last-child { border-bottom: 0; }
  .sess.sel::before { content: ""; position: absolute; left: -10px; top: 9px; bottom: 9px;
                      width: 3px; border-radius: 3px; background: var(--sun); }
  .d { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .d.you { background: var(--sun); animation: pulse 1.8s ease-in-out infinite; }
  .d.run { background: var(--ink); }
  .d.off { background: var(--ash); }
  @keyframes pulse { 50% { opacity: .25; } }
  .who b { font-weight: 600; }
  .who span { color: var(--dim); }
  .sess .st { margin-left: auto; font-size: 11.5px; color: var(--dim); text-align: right; flex: none; }
  .sess .st.you { color: var(--sun); font-weight: 600; }
  .sess.dimmed .who b { font-weight: 400; color: var(--dim); }
  .sess.dimmed .st { color: var(--ash); }

  .empty { color: var(--ash); text-align: center; padding: 40px 0 28px; font-size: 13px; }

  .hist { display: none; padding: 4px 0 12px 17px; border-bottom: 1px solid var(--track); }
  .hist.open { display: block; }
  .hist .ev { font-size: 12px; color: var(--dim); line-height: 1.9; }
  .hist .ev .t { color: var(--ash); margin-right: 8px; }
  .hist .ev b { color: var(--ink); font-weight: 500; }

  .peek { margin: 8px 2px 6px 0; padding: 10px 12px; background: var(--ink);
          color: var(--faint); border-radius: 10px;
          font: 11px/1.55 ui-monospace, "SF Mono", Menlo, monospace;
          max-height: 40vh; overflow: auto; white-space: pre;
          -webkit-overflow-scrolling: touch; }

  #newbar { display: flex; justify-content: center; padding: 14px 0 0; }
  .ghost { background: none; border: 1px solid var(--faint); color: var(--dim);
           border-radius: 999px; padding: 7px 16px; font: inherit; font-size: 12px; }
  .ghost:active { border-color: var(--sun); color: var(--sun); }

  #sheet { display: none; margin-top: 14px; border: 1px solid var(--faint);
           border-radius: 14px; padding: 16px; background: var(--card); }
  #sheet.open { display: block; }
  .hrow { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .hchip { background: none; border: 1px solid var(--faint); border-radius: 999px;
           padding: 6px 14px; font: inherit; font-size: 13px; color: var(--dim); }
  .hchip.sel { border-color: var(--sun); color: var(--sun); }
  #sheet input { margin-bottom: 10px; }
  .acts { display: flex; gap: 8px; justify-content: flex-end; }

  input {
    background: var(--card); color: var(--ink); width: 100%;
    border: 1px solid var(--faint); border-radius: 10px; padding: 11px 13px;
    font: inherit; font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--sun); }
  button.solid {
    background: var(--ink); color: var(--paper); border: 0; border-radius: 10px;
    padding: 11px 18px; font: inherit; font-size: 14px; font-weight: 600;
  }
  button.solid:active { opacity: .8; }

  .spacer { flex: 1; min-height: 18px; }

  #planbar { display: none; border: 1px solid var(--faint); border-left: 3px solid var(--sun);
             border-radius: 12px; background: var(--card); padding: 12px 14px; margin-top: 14px; }
  #planbar.open { display: block; }
  #planbar .pline { font-size: 13px; margin-bottom: 10px; word-break: break-all; }
  #planbar .pline b { color: var(--sun); font-weight: 600; }
  #planbar .chips { display: flex; gap: 8px; }
  .chip { border-radius: 999px; padding: 7px 18px; font: inherit; font-size: 13px; border: 1px solid var(--faint); background: none; color: var(--dim); }
  .chip.go { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }
  .chip:active { opacity: .75; }

  #helm { display: flex; align-items: center; gap: 10px;
          border: 1.5px solid var(--ink); border-radius: 13px;
          background: var(--card); padding: 4px 6px 4px 15px; margin-top: 14px; }
  #helm .rudder { color: var(--sun); font: 700 15px/1 Georgia, serif; flex: none; }
  #helm input { border: 0; padding: 9px 4px; background: none; }
  #helm input:focus { outline: none; }
  #helm button { flex: none; }
  #target { color: var(--ash); font-size: 10.5px; margin: 6px 4px 0; text-align: center; }
  #target b { color: var(--dim); font-weight: 500; }

  #gate { max-width: 340px; margin: 18vh auto 0; text-align: center; }
  #gate .brand { font-size: 30px; }
  #gate p { color: var(--dim); font-size: 12.5px; margin: 12px 0 18px; }
  #gate input { text-align: center; margin-bottom: 10px; }
  #gate button { width: 100%; }
</style>
</head>
<body>
<div class="wrap">

<div id="gate" hidden>
  <div class="brand">KA<i>JI</i></div>
  <p>fleet access token<br>(KAJI_BRAIN_TOKEN on the Mac)</p>
  <input id="tok" type="password" placeholder="token" autocomplete="off">
  <button class="solid" onclick="saveToken()">Connect</button>
</div>

<div id="app" hidden style="display:flex; flex-direction:column; flex:1">
  <header>
    <svg width="17" height="17" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="19" fill="none" stroke="#211c15" stroke-width="6"/>
      <line x1="32" y1="32" x2="52" y2="12" stroke="#f25c05" stroke-width="6" stroke-linecap="round"/>
    </svg>
    <span class="brand">KA<i>JI</i></span>
    <span id="quota"></span>
  </header>
  <hr class="hr">
  <div id="err"></div>
  <div id="list"></div>
  <div id="newbar"><button class="ghost" onclick="toggleSheet()">+ new worker</button></div>
  <div id="sheet">
    <div class="hrow" id="harnesses"></div>
    <input id="cwd" placeholder="working directory" autocapitalize="off" autocomplete="off">
    <input id="task" placeholder="first instruction (optional)" autocomplete="off">
    <div class="acts">
      <button class="ghost" onclick="toggleSheet()">cancel</button>
      <button class="solid" onclick="spawn()">Spawn</button>
    </div>
  </div>
  <div class="spacer"></div>
  <div id="planbar">
    <div class="pline" id="ptext"></div>
    <div class="chips">
      <button class="chip go" onclick="execPlan()">执行</button>
      <button class="chip" onclick="closePlan()">取消</button>
      <button class="chip" onclick="editPlan()">改一改</button>
    </div>
  </div>
  <div id="helm">
    <span class="rudder">舵</span>
    <input id="order" placeholder="说一句，比如：开个 codex 去 wu 修路由…" enterkeyhint="send" autocomplete="off">
    <button class="solid" onclick="sendOrder()">Send</button>
  </div>
  <div id="target"></div>
</div>

</div>
<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem("kaji-token") || "";
let timer = null;
let selected = null;          // selected pane_id (helm input target)
const HARNESSES = ["claude", "codex"];
let selHarness = localStorage.getItem("kaji-harness") || "claude";

// Served at "/" (tailnet/funnel) or under "/c/<rid>/" (relay).
const API_BASE = location.pathname.replace(/\/(mobile)?$/, "");

function saveToken() {
  token = $("tok").value.trim();
  if (!token) return;
  localStorage.setItem("kaji-token", token);
  boot();
}

function logout(msg) {
  localStorage.removeItem("kaji-token"); token = "";
  clearInterval(timer); timer = null;
  stopPeek(); openHist = null;
  $("app").hidden = true; $("gate").hidden = false;
  if (msg) { $("gate").querySelector("p").textContent = msg; }
}

async function api(path, opts) {
  const r = await fetch(API_BASE + path, Object.assign({
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
  }, opts));
  if (r.status === 401) { logout("token rejected — enter it again"); throw new Error("401"); }
  let data = null;
  try { data = await r.json(); } catch (e) { /* non-JSON */ }
  if (!r.ok) throw new Error((data && data.error) || ("HTTP " + r.status));
  return data;
}

function esc(t) {
  return String(t).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function fmtTokens(v) {
  if (v >= 1e6) return (v / 1e6).toFixed(1) + "M";
  if (v >= 1000) return Math.round(v / 1000) + "k";
  return String(v);
}

function fmtRuntime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? h + "h" + String(m).padStart(2, "0") + "m" : m + "m";
}

function dotClass(st) {
  if (st === "waiting") return "you";
  if (st === "working" || st === "running" || st === "busy") return "run";
  return "off";
}

function render(state) {
  const q = state.quota || {}, lim = state.limits || {};
  const segs = [];
  for (const k of ["claude", "codex"]) {
    const l = lim[k] || {};
    const fh = l.five_hour_used_percent, sd = l.seven_day_used_percent;
    if (fh == null && sd == null && !q[k]) continue;
    let t = esc(k);
    if (fh != null) t += " 5h <b>" + Math.round(fh) + "%</b>";
    if (sd != null) t += " wk <b>" + Math.round(sd) + "%</b>";
    if (fh == null && sd == null && q[k]) t += " <b>" + fmtTokens(q[k]) + "</b>";
    segs.push(t);
  }
  $("quota").innerHTML = segs.join(" · ");

  const sessions = state.sessions || [];
  if (selected != null && !sessions.some(s => s.pane_id === selected)) selected = null;
  if (selected == null && sessions.length) selected = sessions[0].pane_id;

  const list = $("list");
  if (!sessions.length) {
    list.innerHTML = '<div class="empty">no active sessions</div>';
    $("target").textContent = "";
    openHist = null; stopPeek();
    return;
  }
  list.innerHTML = "";
  let openSeen = false;
  for (const s of sessions) {
    const st = (s.state || "").toLowerCase();
    const row = document.createElement("div");
    const dim = (st === "done" || st === "idle");
    row.className = "sess" + (s.pane_id === selected ? " sel" : "") + (dim ? " dimmed" : "");
    const ctx = s.context_pct ? " · ctx " + s.context_pct + "%" : "";
    row.innerHTML =
      '<span class="d ' + dotClass(st) + '"></span>' +
      '<span class="who"><b>' + esc(s.harness) + '</b> <span>· ' + esc(s.project || "?") + '</span></span>' +
      '<span class="st' + (st === "waiting" ? " you" : "") + '">' +
        esc(st) + ' ' + fmtRuntime(s.runtime_secs || 0) + esc(ctx) + '</span>';
    row.onclick = () => {
      if (selected === s.pane_id) { toggleHist(s.pane_id, row); return; }
      selected = s.pane_id;
      openHist = null;
      render(state);
    };
    list.appendChild(row);
    if (openHist === s.pane_id) {
      openSeen = true;
      const h = document.createElement("div");
      h.className = "hist open";
      h.id = "hist-" + s.pane_id;
      h.innerHTML = '<div class="ev">…</div>';
      list.appendChild(h);
      fillHist(s.pane_id, h);
      // Live screen: dark pre under the history, refreshed by the peek poller.
      const pk = document.createElement("pre");
      pk.className = "peek";
      pk.id = "peek-" + s.pane_id;
      pk.textContent = (peekPane === s.pane_id && peekText) ? peekText : "…";
      h.appendChild(pk);
      if (pk.textContent !== "…") pk.scrollTop = pk.scrollHeight;
      startPeek(s.pane_id);
    }
  }
  if (!openSeen && openHist != null) { openHist = null; }
  if (openHist == null) stopPeek();
  const sel = sessions.find(s => s.pane_id === selected);
  $("target").innerHTML = sel
    ? "→ <b>" + esc(sel.harness) + " · " + esc(sel.project || "?") + "</b>"
    : "";
}

let pendingPlan = null;
let openHist = null;          // pane_id whose history is expanded

function toggleHist(paneId) {
  openHist = (openHist === paneId) ? null : paneId;
  if (openHist == null) stopPeek();
  refresh();
}

// ── live screen peek ── one interval at a time; collapse/switch kills it.
let peekPane = null, peekTimer = null, peekText = "";

function startPeek(paneId) {
  if (peekPane === paneId && peekTimer) return;
  stopPeek();
  peekPane = paneId;
  fillPeek();
  peekTimer = setInterval(fillPeek, 3000);
}

function stopPeek() {
  if (peekTimer) clearInterval(peekTimer);
  peekTimer = null; peekPane = null; peekText = "";
}

async function fillPeek() {
  if (peekPane == null) return;
  const pane = peekPane;
  try {
    const r = await api("/api/peek?pane=" + pane + "&lines=80");
    if (pane !== peekPane) return;   // collapsed/switched while in flight
    peekText = r.text || "";
    const el = $("peek-" + pane);
    if (el) { el.textContent = peekText || "(blank screen)"; el.scrollTop = el.scrollHeight; }
  } catch (e) {
    if (e.message === "401" || pane !== peekPane) return;
    const el = $("peek-" + pane);
    if (el) el.textContent = "(screen unavailable: " + e.message + ")";
  }
}

async function fillHist(paneId, el) {
  try {
    const evs = await api("/api/timeline?pane=" + paneId);
    const last = (evs || []).slice(-5).reverse();
    if (!last.length) { el.innerHTML = '<div class="ev">(no history yet)</div>'; return; }
    el.innerHTML = last.map(e => {
      const t = new Date((e.ts || 0) * 1000);
      const hm = String(t.getHours()).padStart(2, "0") + ":" + String(t.getMinutes()).padStart(2, "0");
      const what = e.ev === "spawn" ? (e.task || "(no task)")
                 : e.ev === "dispatch" ? (e.text || "")
                 : e.ev === "state" ? (e.to || "") : "";
      return '<div class="ev"><span class="t">' + hm + '</span><b>' + esc(e.ev || "?") +
             '</b> ' + esc(String(what).slice(0, 80)) + '</div>';
    }).join("");
  } catch (err) {
    el.innerHTML = '<div class="ev">(history unavailable)</div>';
  }
}

async function sendOrder() {
  const text = $("order").value.trim();
  if (!text) return;
  $("order").value = "";
  $("ptext").innerHTML = "…";
  $("planbar").classList.add("open");
  try {
    const plan = await api("/api/plan", { method: "POST",
      body: JSON.stringify({ order: text }) });
    if (plan.action === "send") {
      pendingPlan = plan;
      $("ptext").innerHTML = "→ 回 <b>pane " + esc(plan.pane_id) + "</b>：" + esc(plan.text || "");
    } else if (plan.action === "spawn") {
      pendingPlan = plan;
      $("ptext").innerHTML = "→ <b>spawn " + esc(plan.harness) + "</b> · " +
        esc(plan.cwd || "") + "：" + esc(plan.task || "");
    } else {
      pendingPlan = null;
      $("ptext").innerHTML = "× " + esc(plan.why || "没看懂");
      setTimeout(closePlan, 3500);
    }
  } catch (e) {
    closePlan();
    showErr("plan failed: " + e.message);
  }
}

function closePlan() { pendingPlan = null; $("planbar").classList.remove("open"); }

function editPlan() {
  if (!pendingPlan) return;
  $("order").value = pendingPlan.action === "send" ? (pendingPlan.text || "")
                                                   : (pendingPlan.task || "");
  $("order").focus();
  // edited text replaces the plan's payload on the next 执行
  $("order").onkeydown = e => {
    if (e.key === "Enter") {
      if (pendingPlan.action === "send") pendingPlan.text = $("order").value.trim();
      else pendingPlan.task = $("order").value.trim();
      $("order").value = "";
      $("order").onkeydown = ev => { if (ev.key === "Enter") sendOrder(); };
      execPlan();
    }
  };
}

async function execPlan() {
  const plan = pendingPlan;
  if (!plan) return;
  closePlan();
  try {
    if (plan.action === "send") {
      await api("/api/send", { method: "POST",
        body: JSON.stringify({ pane_id: plan.pane_id, text: plan.text || "" }) });
    } else {
      const r = await api("/api/spawn", { method: "POST",
        body: JSON.stringify({ harness: plan.harness || "claude",
                               cwd: plan.cwd || "", task: plan.task || "" }) });
      if (r && r.pane_id != null) selected = r.pane_id;
    }
    refresh();
  } catch (e) { showErr("failed: " + e.message); }
}

function toggleSheet() {
  const sh = $("sheet");
  sh.classList.toggle("open");
  if (sh.classList.contains("open")) {
    renderHarnesses();
    $("cwd").value = localStorage.getItem("kaji-cwd") || "";
  }
}

function renderHarnesses() {
  $("harnesses").innerHTML = HARNESSES.map(h =>
    '<button class="hchip' + (h === selHarness ? " sel" : "") + '" data-h="' + h + '">' + h + '</button>').join("");
  for (const b of $("harnesses").querySelectorAll(".hchip")) {
    b.onclick = () => { selHarness = b.dataset.h; localStorage.setItem("kaji-harness", selHarness); renderHarnesses(); };
  }
}

async function spawn() {
  const cwd = $("cwd").value.trim();
  if (!cwd) { showErr("working directory required"); return; }
  localStorage.setItem("kaji-cwd", cwd);
  const body = { harness: selHarness, cwd };
  const task = $("task").value.trim();
  if (task) body.task = task;
  try {
    const r = await api("/api/spawn", { method: "POST", body: JSON.stringify(body) });
    toggleSheet(); $("task").value = "";
    selected = r.pane_id;
    refresh();
  } catch (e) { showErr("spawn failed: " + e.message); }
}

function showErr(msg) {
  const el = $("err");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 4000);
}

async function refresh() {
  try {
    render(await api("/api/state"));
  } catch (e) {
    if (e.message !== "401") showErr("unreachable — is the Mac online?");
  }
}

function boot() {
  $("gate").hidden = true; $("app").hidden = false;
  refresh();
  clearInterval(timer);
  timer = setInterval(refresh, 4000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) refresh();
  });
}

$("order").onkeydown = e => { if (e.key === "Enter") sendOrder(); };

// QR pairing: `kaji-brain qr` embeds the token in the URL FRAGMENT — the
// fragment never leaves the browser (not sent to the relay). Store + strip.
(function () {
  const m = location.hash.match(/tok=([0-9a-f]+)/);
  if (m) {
    token = m[1];
    localStorage.setItem("kaji-token", token);
    history.replaceState(null, "", location.pathname + location.search);
  }
})();
token ? boot() : ($("gate").hidden = false);
</script>
</body>
</html>
