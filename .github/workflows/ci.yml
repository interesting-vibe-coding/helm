name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Cargo Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked -p kaku -p kaku-gui
      - name: Check kaku.lua syntax
        run: luac -p assets/macos/Helm.app/Contents/Resources/kaku.lua
