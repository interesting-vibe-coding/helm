name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Rust build + tests ────────────────────────────────────────────────────
  # Only runs when Rust/Cargo source actually changes. Skipped for docs,
  # scripts, Lua, Python, and asset-only PRs — no need to spend 5 min on
  # cargo check when only README.md changed.
  # Real path filter (the old `if` had a stray `|| true` — every PR paid the
  # 5-minute cargo check even for docs). A skipped required check counts as
  # satisfied for branch protection, so docs/python PRs merge in ~1 min.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  cargo:
    name: Cargo Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check
        run: cargo check --locked -p kaku -p kaku-gui
      - name: Scroll regression tests
        run: cargo test --locked -p wezterm-term scrollback

  # ── Scripts + assets lint (always runs, fast) ─────────────────────────────
  lint:
    name: Lint & Brand Guards
    # ubuntu spins up much faster than the macos runner queue — everything in
    # this job is platform-independent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check kaku.lua syntax
        run: |
          sudo apt-get install -y -qq lua5.4 >/dev/null 2>&1 || sudo apt-get install -y -qq lua5.3 >/dev/null 2>&1 || true
          LUAC=$(command -v luac5.4 || command -v luac5.3 || command -v luac)
          "$LUAC" -p assets/macos/Helm.app/Contents/Resources/kaku.lua

      - name: Lint Python tools
        run: find tools -name '*.py' | xargs -I{} python3 -m py_compile {}

      - name: kaji-brain unit tests
        run: cd tools/kaji-brain && python3 -m unittest discover -p 'test_*.py'

      - name: brain-cockpit unit tests
        run: cd tools/brain-cockpit && python3 -m unittest discover -p 'test_*.py'

      - name: Check required docs exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f CONTRIBUTING.md || (echo "CONTRIBUTING.md missing" && exit 1)

      - name: Rename regression — no stale 'Helm' brand strings
        run: |
          bad=$(grep -rn "\bHelm\b" \
            --include="*.py" --include="*.sh" --include="*.lua" \
            --include="*.rs" --include="*.toml" --include="*.json" \
            --include="*.md" \
            assets/shell-integration/ \
            assets/skills/ \
            tools/kaji-brain/ \
            install.sh \
            scripts/build.sh scripts/dev-link.sh \
            kaku/src/config_tui/ \
            | grep -v "assets/macos/Helm\.app" \
            | grep -v "local Helm\b\|Helm\.\|function Helm\." \
            | grep -v "docs/ROADMAP\|docs/BRAIN_DESIGN\|CHANGELOG\|docs/paper\|docs/demo" \
            | grep -v "^Binary" || true)
          if [[ -n "$bad" ]]; then
            echo "ERROR: stale 'Helm' brand string found (should be 'Kaji'):"
            echo "$bad"
            exit 1
          fi
          echo "✓ No stale Helm brand strings"

      - name: Info.plist bundle id check
        run: |
          # plistlib not plutil — this job runs on ubuntu (plutil is macOS-only).
          id=$(python3 -c "import plistlib; print(plistlib.load(open('assets/macos/Helm.app/Contents/Info.plist','rb'))['CFBundleIdentifier'])")
          [[ "$id" == "dev.kaji.app" ]] || \
            (echo "ERROR: bundle id is '$id', expected 'dev.kaji.app'" && exit 1)
          echo "✓ bundle id: $id"
