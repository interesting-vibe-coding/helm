<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Kaji mark — the helm (舵): an ink ring (wheel / ensō) with ONE persimmon
       spoke running from the hub out past the rim — the captain's hand.
       Palette: ink #211c15 · persimmon #f25c05 (Kaji Sun). -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#211c15" stroke-width="12"/>
  <line x1="64" y1="64" x2="104" y2="24" stroke="#f25c05" stroke-width="12" stroke-linecap="round"/>
</svg>
